# =============================================
#   SecureTest - Application Configuration
#   Env vars override these values in production (Render)
# =============================================

# Render injects PORT automatically
server.port=${PORT:8080}

# =============================================
#   MongoDB — Set MONGODB_URI on Render dashboard
#   Format: mongodb+srv://user:pass@cluster.mongodb.net/securetest
# =============================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/securetest}
spring.data.mongodb.database=securetest

# =============================================
#   JWT — Set JWT_SECRET on Render dashboard
#   Must be a long random string (32+ chars)
# =============================================
app.jwt.secret=${JWT_SECRET:SecureTestLocalDevSecretKeyMustBeAtLeast256BitsLong!!!!!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
#   CORS — Set CORS_ORIGIN on Render dashboard
#   e.g. https://your-frontend.onrender.com
# =============================================
app.cors.allowed-origins=${CORS_ORIGIN:http://localhost:3000}

# =============================================
#   Swagger / OpenAPI
#   Access at: http://localhost:8080/swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
#   Logging
# =============================================
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.level.com.securetest=INFO

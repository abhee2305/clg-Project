<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procto AI — AI Proctored Exams</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #222230;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #43e97b;
      --error: #ff6584;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -100px;
    }
    body::after {
      width: 500px; height: 500px;
      background: var(--accent2);
      bottom: -150px; right: -100px;
      animation-delay: -6s;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
    }

    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 0 40px rgba(108,99,255,0.4);
    }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: slideUp 0.5s cubic-bezier(.22,1,.36,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.25s;
      color: var(--muted);
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108,99,255,0.4);
    }

    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    select option { background: var(--surface); }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b7fff);
      color: #fff;
      box-shadow: 0 8px 24px rgba(108,99,255,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(108,99,255,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

    .alert {
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .alert.error   { background: rgba(255,101,132,0.12); border: 1px solid rgba(255,101,132,0.3); color: var(--error); display: flex; }
    .alert.success { background: rgba(67,233,123,0.1);  border: 1px solid rgba(67,233,123,0.3);  color: var(--success); display: flex; }

    .demo-creds {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(108,99,255,0.07);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 10px;
      font-size: 0.8rem;
    }
    .demo-creds p { color: var(--muted); margin-bottom: 0.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    .demo-creds code { color: var(--accent); cursor: pointer; display: block; padding: 2px 0; }
    .demo-creds code:hover { color: #fff; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    <h1>Procto AI</h1>
    <p>AI-Powered Online Exam Proctoring</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>

      <div class="demo-creds">
        <p>🧪 Demo Credentials (click to fill)</p>
        <code onclick="fillLogin('teacher@securetest.com','teacher123')">👩‍🏫 Teacher: teacher@securetest.com / teacher123</code>
        <code onclick="fillLogin('student1@securetest.com','student123')">👨‍🎓 Student: student1@securetest.com / student123</code>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>I am a</label>
        <select id="reg-role">
          <option value="STUDENT">Student</option>
          <option value="TEACHER">Teacher</option>
        </select>
      </div>
      <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<script>
  const API = '/api';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    hideAlert();
  }

  function fillLogin(email, pass) {
    document.getElementById('login-email').value    = email;
    document.getElementById('login-password').value = pass;
  }

  function showAlert(msg, type='error') {
    const el = document.getElementById('alert');
    el.textContent = (type==='error' ? '⚠️ ' : '✅ ') + msg;
    el.className = 'alert ' + type;
  }
  function hideAlert() { document.getElementById('alert').className = 'alert'; }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Please wait...' : (btnId==='login-btn' ? 'Sign In' : 'Create Account');
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAlert('Please fill in all fields.');
    setLoading('login-btn', true);
    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert(data.message || 'Invalid credentials.');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user',  JSON.stringify({ id: data.id, name: data.name, email: data.email, role: data.role }));
      showAlert('Welcome back, ' + data.name + '!', 'success');
      setTimeout(() => {
        window.location.href = data.role === 'TEACHER' ? '/teacher.html' : '/student.html';
      }, 800);
    } catch(e) {
      showAlert('Server error. Please try again.');
    } finally {
      setLoading('login-btn', false);
    }
  }

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const role     = document.getElementById('reg-role').value;
    if (!name || !email || !password) return showAlert('Please fill in all fields.');
    if (password.length < 6) return showAlert('Password must be at least 6 characters.');
    setLoading('reg-btn', true);
    try {
      const res  = await fetch(`${API}/auth/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();
      if (!res.ok) return showAlert(data.message || 'Registration failed.');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user',  JSON.stringify({ id: data.id, name: data.name, email: data.email, role: data.role }));
      showAlert('Account created!', 'success');
      setTimeout(() => {
        window.location.href = role === 'TEACHER' ? '/teacher.html' : '/student.html';
      }, 800);
    } catch(e) {
      showAlert('Server error. Please try again.');
    } finally {
      setLoading('reg-btn', false);
    }
  }

  // Auto-redirect if already logged in
  window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user') || 'null');
    if (token && user) window.location.href = user.role === 'TEACHER' ? '/teacher.html' : '/student.html';
  });
</script>
</body>
</html>
